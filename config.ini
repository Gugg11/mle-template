[DATA]
x_data = data/Seeds_X.csv
y_data = data/Seeds_y.csv

[SPLIT_DATA]
x_train = data/Train_Seeds_X.csv
y_train = data/Train_Seeds_y.csv
x_test = data/Test_Seeds_X.csv
y_test = data/Test_Seeds_y.csv

[D_TREE]
criterion = entropy
path = experiments/d_tree.sav

[GNB]
path = experiments/gnb.sav

[KNN]
n_neighbors = 5
metric = minkowski
p = 2
path = experiments/knn.sav

[LOG_REG]
path = experiments/log_reg.sav

[RAND_FOREST]
n_estimators = 100
criterion = entropy
path = experiments/rand_forest.sav

[SVM]
kernel = linear
random_state = 0
path = experiments/svm.sav
